# SkyLab 反向代理 —— 單一對外入口 :80
# 同源分流：/api、/ws、/docs 等 → backend:8000；其餘 → frontend:80
#
# 前端 VITE_API_URL 留空 → API 走相對路徑、WebSocket 用 window.location.host，
# 因此一切同源：免 CORS、不綁定固定 host，從哪個 IP/網域進來就走那個，IP 變動無感。

server {
    listen 80;
    server_name _;
    # 把 scheme 留在 proxy_pass directive、host:port 放在變數，
    # 強制 nginx 用 resolver 在每次請求時解析，避開 startup DNS lookup
    # 造成 emerg（當 backend / frontend 容器尚未進入 Docker DNS 時會發生）。
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ISO 等大檔上傳：不限制 body 大小，並關閉請求緩衝（邊收邊轉）
    client_max_body_size 0;
    proxy_request_buffering off;

    # 後端 REST API
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI 文件
    location ~ ^/(docs|redoc|openapi\.json) {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # VNC / Terminal WebSocket（需要 upgrade，長連線）
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 前端 SPA（frontend 容器內的 nginx 已處理 try_files fallback）
    location / {
        set $frontend_new_upstream frontend_new:80;
        proxy_pass http://$frontend_new_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /old/ {
        # frontend_old 容器內的 nginx dist 放在 root，不知道 /old/ 前綴。
        # 用 rewrite 把 /old/foo 轉成 /foo 再 proxy（用變數 proxy_pass
        # 時 nginx 不會自動 strip location prefix，必須顯式 rewrite）。
        #
        # 注意：set 必須放在 rewrite 之前。`rewrite ... break` 會停止當前
        # location 內所有後續 rewrite-module 指令（含 set），否則 $frontend_old_upstream
        # 不會被賦值，proxy_pass 變成 http:// → invalid URL prefix → 500。
        set $frontend_old_upstream frontend_old:80;
        rewrite ^/old/(.*)$ /$1 break;
        proxy_pass http://$frontend_old_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
