# SkyLab 反向代理 —— 單一對外入口 :80
# 同源分流：/api、/ws、/docs 等 → backend:8000；其餘 → frontend:80
#
# 前端 VITE_API_URL 留空 → API 走相對路徑、WebSocket 用 window.location.host，
# 因此一切同源：免 CORS、不綁定固定 host，從哪個 IP/網域進來就走那個，IP 變動無感。

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s;

    # ISO 等大檔上傳：不限制 body 大小，並關閉請求緩衝（邊收邊轉）
    client_max_body_size 0;
    proxy_request_buffering off;

    # 後端 REST API
    location /api/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI 文件
    location ~ ^/(docs|redoc|openapi\.json) {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # VNC / Terminal WebSocket（需要 upgrade，長連線）
    location /ws/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 前端 SPA（frontend 容器內的 nginx 已處理 try_files fallback）
    location / {
        set $upstream_frontend http://frontend_new:80;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /old/ {
        set $upstream_frontend http://frontend_old:80;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
