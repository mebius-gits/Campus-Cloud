server {
  listen 80;
  root /usr/share/nginx/html;

  # Static assets — return real 404 instead of falling back to index.html.
  # Otherwise an early request (before deploy lands a new asset) gets HTML,
  # and any CDN in front (e.g. Cloudflare) caches that HTML under the asset URL.
  location ~* \.(ico|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot|css|js|map|json|txt|xml)$ {
    try_files $uri =404;
  }

  # SPA shell — every other path falls back to index.html for client-side routing.
  location / {
    index index.html index.htm;
    try_files $uri /index.html;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
