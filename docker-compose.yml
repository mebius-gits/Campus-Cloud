# SkyLab — Docker Compose

x-backend-env: &backend-env
  DOMAIN: ${DOMAIN}
  FRONTEND_HOST: ${FRONTEND_HOST?Variable not set}
  ENVIRONMENT: ${ENVIRONMENT}
  ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
  SECRET_KEY: ${SECRET_KEY?Variable not set}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
  SMTP_HOST: ${SMTP_HOST:-mailcatcher}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_TLS: ${SMTP_TLS:-false}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-noreply@example.com}
  POSTGRES_SERVER: db
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER?Variable not set}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  PROXMOX_HOST: ${PROXMOX_HOST}
  PROXMOX_USER: ${PROXMOX_USER}
  PROXMOX_PASSWORD: ${PROXMOX_PASSWORD}
  PROXMOX_VERIFY_SSL: ${PROXMOX_VERIFY_SSL:-false}
  PROXMOX_ISO_STORAGE: ${PROXMOX_ISO_STORAGE}
  PROXMOX_DATA_STORAGE: ${PROXMOX_DATA_STORAGE}
  SENTRY_DSN: ${SENTRY_DSN}


services:

  # -------------------------
  # Nginx Reverse Proxy
  # -------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - skylab
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  # -------------------------
  # PostgreSQL
  # -------------------------
  db:
    image: postgres:18
    restart: always
    ports:
      # Bind to localhost only: reachable for on-host tooling, never from the
      # public network. Inter-container access uses the `db` service DNS name.
      - "127.0.0.1:5432:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - skylab

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------
  # Redis
  # -------------------------
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Localhost only — Redis has no auth; must never be exposed externally.
      - "127.0.0.1:6379:6379"
    volumes:
      - app-redis-data:/data
    networks:
      - skylab

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------
  # Mailcatcher
  # -------------------------
  mailcatcher:
    image: schickling/mailcatcher
    ports:
      # Dev-only mail sink — bind to localhost so captured mail (incl. password
      # reset links) is not readable from the public network. Replace with a
      # real SMTP (set SMTP_HOST/SMTP_* in .env) before a real production run.
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:1025:1025"
    networks:
      - skylab

  # -------------------------
  # Prestart
  # -------------------------
  prestart:
    image: '${DOCKER_IMAGE_BACKEND}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skylab

  # -------------------------
  # Backend (FastAPI)
  # -------------------------
  backend:
    image: '${DOCKER_IMAGE_BACKEND}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - fastapi
      - run
      - --reload
      - app/main.py
    ports:
      # Localhost only: the public entry point is nginx (:80), which proxies
      # /api and /ws to this service over the internal network. Exposing 8000
      # externally would let callers bypass nginx and forge X-Forwarded-For.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skylab

  # -------------------------
  # Worker (arq 任務隊列)
  # -------------------------
  worker:
    image: '${DOCKER_IMAGE_BACKEND}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - arq
      - app.infrastructure.queue.worker.WorkerSettings
    env_file:
      - .env
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - skylab

  # -------------------------
  # Frontend
  # -------------------------
  frontend:
    image: '${DOCKER_IMAGE_FRONTEND:-frontend}:${TAG-latest}'
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
    ports:
      # Localhost only — public traffic goes through nginx (:80).
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skylab

# -------------------------
# Volumes
# -------------------------
volumes:
  app-db-data:
  app-redis-data:

# -------------------------
# Networks (核心修正點)
# -------------------------
networks:
  skylab:
    driver: bridge
