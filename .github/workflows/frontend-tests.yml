name: Frontend Tests

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: jobs only need to read repo contents
permissions:
  contents: read

jobs:
  vitest:
    name: vitest + biome + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # bun.lock is generated on Windows and only locks win32 platform
        # binaries for nested esbuild (via tsx). Removing all lockfiles
        # (including package-lock.json that bun would otherwise migrate
        # from) forces a clean resolution on this Linux runner.
        run: |
          rm -f ../bun.lock bun.lock ../package-lock.json package-lock.json
          bun install

      - name: Biome lint + format check
        run: bunx biome check .

      - name: Run vitest
        run: bunx vitest run

      - name: Type-check + production build
        # `bun run build` runs `tsc --noEmit` then `vite build`
        # If the OpenAPI client is missing, generate-client step would normally
        # be required, but we ship the generated client in-repo, so build works.
        run: bun run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: ignore

  # Summary job — name must match the required status check in branch protection
  ci-pass:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [vitest]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
